services:
  gui-desktop:
    build:
      context: .
      dockerfile: Dockerfile.gui
    image: the-world/gui-desktop:latest
    container_name: the-world-gui
    shm_size: '1gb'
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - ${HOME}/.the-world/gui/config:/config
      - ${HOME}/.the-world/shared:/workspace/shared
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - TITLE=TheWorld GUI Desktop
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
